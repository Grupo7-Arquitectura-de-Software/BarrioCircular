spring.application.name=barriocircular
spring.config.import=optional:file:.env[.properties]

# ===============================
# Conexion a Supabase (PostgreSQL - Session Pooler)
# ===============================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:0}

# ===============================
# Spring Data JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Autenticacion (Clerk)
# ===============================
clerk.jwks-uri=${CLERK_JWKS_URI}
clerk.issuer=${CLERK_ISSUER}

# ===============================
# Sugerencia de Precio con IA (GroQ)
# ===============================
groq.api-key=${GROQ_API_KEY}
groq.model=${GROQ_MODEL:llama-3.1-8b-instant}
# Modelo con vision para estimar el precio a partir de la foto de evidencia.
# Ajustar segun el catalogo de modelos con vision vigente en GroQ.
groq.vision-model=${GROQ_VISION_MODEL:meta-llama/llama-4-scout-17b-16e-instruct}
groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}

# ===============================
# Verificacion de identidad
# ===============================
app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://www.barriocircular.site,https://barriocircular.site}
