services:
  db:
    image: postgis/postgis:16-3.4
    container_name: barriocircular-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: barriocircular
      POSTGRES_USER: barriocircular
      POSTGRES_PASSWORD: barriocircular
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - barriocircular_pgdata:/var/lib/postgresql/data
      - ./backend/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barriocircular -d barriocircular"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  frontend-dev:
    build:
      context: ./frontend/BarrioCircular/
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend/BarrioCircular/src:/app/src
      - ./frontend/BarrioCircular/public:/app/public
      - ./frontend/BarrioCircular/index.html:/app/index.html
      - ./frontend/BarrioCircular/vite.config.js:/app/vite.config.js
      - /app/node_modules

volumes:
  barriocircular_pgdata:
    name: barriocircular_pgdata