services:
  db:
    image: postgis/postgis:16-3.4
    container_name: barriocircular-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: barriocircular
      POSTGRES_USER: barriocircular
      POSTGRES_PASSWORD: barriocircular
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - barriocircular_pgdata:/var/lib/postgresql/data
      - ./backend/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barriocircular -d barriocircular"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - /app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/barriocircular
      SPRING_DATASOURCE_USERNAME: barriocircular
      SPRING_DATASOURCE_PASSWORD: barriocircular
    depends_on:
      db:
        condition: service_healthy

volumes:
  barriocircular_pgdata:
    name: barriocircular_pgdata